[program:rednote-opportunity]
directory=__PROJECT_DIR__
command=/bin/bash -lc "bash scripts/run_scheduled_loop.sh opportunity"
autostart=true
autorestart=true
startsecs=3
stopsignal=TERM
stdout_logfile=__PROJECT_DIR__/logs/supervisor-opportunity.log
stderr_logfile=__PROJECT_DIR__/logs/supervisor-opportunity.err.log
environment=PYTHONPATH="src",SCHED_OPPORTUNITY_LOOP_INTERVAL_SECONDS="600"
