[program:rednote-ui]
directory=/root/rednote-spider
command=/bin/bash -lc "source /root/rednote-spider/.venv/bin/activate && bash scripts/run_ui_server.sh"
autostart=true
autorestart=true
startsecs=5
stopsignal=TERM
stdout_logfile=/root/rednote-spider/logs/supervisor-ui.log
stderr_logfile=/root/rednote-spider/logs/supervisor-ui.err.log
environment=PYTHONPATH="src"
